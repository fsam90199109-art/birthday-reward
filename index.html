<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#031224,#0A1F44,#173A75);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;

}

body::before{

content:"";
position:absolute;
width:200%;
height:200%;
background-image:
radial-gradient(rgba(255,255,255,.15) 1px, transparent 1px);

background-size:45px 45px;

animation:stars 35s linear infinite;

opacity:.35;

}

@keyframes stars{

100%{
transform:translateY(-250px);
}

}

.card{

position:relative;

width:430px;

padding:45px;

border-radius:28px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.15);

box-shadow:0 20px 50px rgba(0,0,0,.45);

text-align:center;

z-index:2;

}

.gift{

font-size:70px;

animation:float 3s ease-in-out infinite;

}

@keyframes float{

50%{
transform:translateY(-10px);
}

}

h1{

margin-top:15px;

font-size:34px;

}

p{

margin-top:20px;

color:#D5E1FF;

line-height:1.7;

font-size:18px;

}

button{

margin-top:35px;

padding:17px 45px;

border:none;

border-radius:60px;

background:#2563EB;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

box-shadow:0 0 25px rgba(37,99,235,.45);

}

button:hover{

transform:scale(1.05);

background:#3B82F6;

}

.loader{

display:none;

margin:35px auto;

width:65px;

height:65px;

border-radius:50%;

border:6px solid rgba(255,255,255,.15);

border-top:6px solid white;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

#status{

display:none;

font-size:22px;

margin-top:15px;

min-height:40px;

}

.small{

margin-top:20px;

font-size:15px;

color:#bfcfff;

}

canvas{

position:fixed;

left:0;
top:0;
pointer-events:none;

}

</style>

</head>

<body>

<canvas id="confetti"></canvas>

<div class="card">

<div class="gift">🎁</div>

<h1>One Last Surprise</h1>

<p>

If you've made it this far...

<br><br>

You deserve one final birthday surprise.

</p>

<button id="btn">

💙 Unwrap My Surprise

</button>

<div class="loader" id="loader"></div>

<div id="status"></div>

<div class="small" id="small"></div>

</div>

<script>

const webhook="https://eo3102tigqksbyr.m.pipedream.net";

const canva="https://www.canva.com/design/DAHP2dia0e8/kiZvArINAA9J2Yt41qm-8g/edit";

const messages=[

"✔ Birthday verified",

"🏦 Connecting...",

"🎁 Unlocking surprise...",

"💸 Finalizing...",

"🎉 Done! Check your PhonePe ❤️"

];

document.getElementById("btn").onclick=function(){

launchConfetti();

this.style.display="none";

document.getElementById("loader").style.display="block";

document.getElementById("status").style.display="block";

document.getElementById("small").innerHTML="Please wait a few seconds...";

fetch(webhook,{method:"GET",mode:"no-cors"});

let i=0;

let interval=setInterval(()=>{

document.getElementById("status").innerHTML=messages[i];

i++;

if(i===messages.length){

clearInterval(interval);

setTimeout(()=>{

window.location.href=canva;

},2500);

}

},1200);

};

// -------- Confetti --------

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let pieces=[];

function launchConfetti(){

for(let i=0;i<150;i++){

pieces.push({

x:Math.random()*canvas.width,

y:-20,

r:Math.random()*6+4,

dx:(Math.random()-0.5)*5,

dy:Math.random()*4+3,

color:["#3B82F6","#60A5FA","#FFFFFF","#93C5FD"][Math.floor(Math.random()*4)]

});

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pieces.forEach((p,index)=>{

ctx.fillStyle=p.color;

ctx.beginPath();

ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

ctx.fill();

p.x+=p.dx;

p.y+=p.dy;

if(p.y>canvas.height) pieces.splice(index,1);

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
