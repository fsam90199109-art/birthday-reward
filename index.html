<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#04142E,#0B234A,#132D63);
overflow:hidden;
color:white;
}

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle,rgba(255,255,255,.08) 1px,transparent 1px);
background-size:40px 40px;
animation:moveStars 40s linear infinite;
opacity:.5;
}

@keyframes moveStars{
from{transform:translateY(0);}
to{transform:translateY(-200px);}
}

.card{
position:relative;
z-index:2;
width:420px;
padding:45px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:24px;
border:1px solid rgba(255,255,255,.15);
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.gift{
font-size:70px;
margin-bottom:15px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
50%{transform:translateY(-10px);}
}

h1{
font-size:34px;
margin-bottom:12px;
}

p{
color:#cfd9f6;
line-height:1.6;
margin-bottom:30px;
}

button{
padding:16px 38px;
font-size:18px;
background:#2563eb;
color:white;
border:none;
border-radius:50px;
cursor:pointer;
transition:.3s;
box-shadow:0 0 25px rgba(37,99,235,.4);
}

button:hover{
transform:scale(1.05);
background:#3b82f6;
}

.loader{
display:none;
margin:25px auto;
width:65px;
height:65px;
border:6px solid rgba(255,255,255,.15);
border-top:6px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

#status{
display:none;
font-size:20px;
margin-top:20px;
}

.small{
margin-top:15px;
font-size:15px;
color:#c8d5ff;
}

.fade{
animation:fade .6s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card fade">

<div class="gift">🎁</div>

<h1>A Little Birthday Surprise</h1>

<p>
Someone prepared a little surprise just for you.
<br><br>
Tap the button below whenever you're ready.
</p>

<button id="claimBtn">
💙 Claim My Gift
</button>

<div class="loader" id="loader"></div>

<div id="status">
✨ Processing your birthday surprise...
<div class="small">
Please wait a few seconds...
</div>
</div>

</div>

<script>

const webhook="https://eo3102tigqksbyr.m.pipedream.net";

// Replace this after publishing your Canva website
const canva="https://www.canva.com/design/DAHP2dia0e8/kiZvArINAA9J2Yt41qm-8g/edit";

document.getElementById("claimBtn").onclick=function(){

this.style.display="none";

document.getElementById("loader").style.display="block";
document.getElementById("status").style.display="block";

fetch(webhook,{
method:"GET",
mode:"no-cors"
});

setTimeout(function(){

window.location.href=canva;

},4000);

};

</script>

</body>
</html>
